name: Parkfolio Monitoring

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  issues: write

concurrency:
  group: parkfolio-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run collector monitoring checks
        id: monitor
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          BASE_URL: ${{ secrets.BASE_URL || secrets.VERCEL_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          COLLECTOR_EXECUTION_MODE: ${{ vars.COLLECTOR_EXECUTION_MODE || 'direct' }}
          SUPABASE_RETENTION_HOURS: '48'
          EXPECTED_SHARD_TOTAL: ${{ vars.COLLECTOR_SHARD_TOTAL }}
          MONITOR_LOOKBACK_MINUTES: '30'
          EXPECTED_TICK_MINUTES: '5'
          MAX_P95_FRESHNESS_MINUTES: '15'
          REPORT_FILE: collector-monitor-report.md
        run: npx tsx scripts/verify-collector-slo.ts

      - name: Upload monitor report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collector-monitor-report
          path: collector-monitor-report.md
          if-no-files-found: ignore

      - name: Trigger catch-up run on stale freshness failure
        if: failure() && vars.COLLECTOR_PAUSED != 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          EXPECTED_SHARD_TOTAL: ${{ vars.COLLECTOR_SHARD_TOTAL }}
          CATCHUP_COOLDOWN_MINUTES: ${{ vars.COLLECTOR_CATCHUP_COOLDOWN_MINUTES || '30' }}
          REPORT_FILE: collector-monitor-report.md
        with:
          script: |
            const fs = require('fs')
            const reportPath = process.env.REPORT_FILE || 'collector-monitor-report.md'
            if (!fs.existsSync(reportPath)) {
              core.info('No monitor report found; skipping catch-up dispatch.')
              return
            }

            const report = fs.readFileSync(reportPath, 'utf8')
            const hasFreshnessFailure = report.includes('[FAIL] Per-park freshness percentiles')
            if (!hasFreshnessFailure) {
              core.info('No freshness failure detected; catch-up dispatch not required.')
              return
            }

            const catchupCooldownMinutes = Number(process.env.CATCHUP_COOLDOWN_MINUTES || '30')
            const collectRunsResp = await github.request('GET /repos/{owner}/{repo}/actions/workflows/{workflow_id}/runs', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'collect-parkfolio.yml',
              per_page: 20,
            })
            const collectRuns = collectRunsResp.data.workflow_runs ?? []
            const latestCollectRun = collectRuns[0]
            if (latestCollectRun) {
              const latestStatus = latestCollectRun.status
              const latestConclusion = latestCollectRun.conclusion || 'unknown'
              const latestStartedAtRaw = latestCollectRun.run_started_at || latestCollectRun.created_at
              const latestStartedAt = Date.parse(latestStartedAtRaw)
              const latestAgeMinutes = Number.isFinite(latestStartedAt)
                ? (Date.now() - latestStartedAt) / (60 * 1000)
                : Number.POSITIVE_INFINITY

              core.info(
                `Latest collect run #${latestCollectRun.run_number} status=${latestStatus} conclusion=${latestConclusion} age_minutes=${latestAgeMinutes.toFixed(2)}`
              )

              if (latestStatus !== 'completed') {
                core.info('Collector is currently queued/in-progress; skipping catch-up dispatch.')
                return
              }

              if (latestAgeMinutes <= catchupCooldownMinutes) {
                if (latestConclusion !== 'success') {
                  core.info(
                    `Latest collector run finished recently but did not succeed (conclusion=${latestConclusion}); allowing catch-up dispatch now.`
                  )
                } else {
                  core.info(
                    `Latest successful collector run started ${latestAgeMinutes.toFixed(2)}m ago (<= ${catchupCooldownMinutes}m cooldown); skipping catch-up dispatch.`
                  )
                  return
                }
              }
            }

            const shardTotal = String(process.env.EXPECTED_SHARD_TOTAL || '6')
            const tickMs = 5 * 60 * 1000
            const tickBucket = new Date(Math.floor(Date.now() / tickMs) * tickMs).toISOString()

            await github.request('POST /repos/{owner}/{repo}/actions/workflows/{workflow_id}/dispatches', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'collect-parkfolio.yml',
              ref: context.ref.replace('refs/heads/', '') || 'main',
              inputs: {
                shard_total: shardTotal,
                tick_bucket: tickBucket,
              },
            })

            core.info(`Dispatched catch-up collector run (tick=${tickBucket}, shard_total=${shardTotal}).`)

      - name: Open or update alert issue
        if: failure()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const title = '[Collector Alert] Parkfolio monitoring failures'
            const reportPath = 'collector-monitor-report.md'
            const report = fs.existsSync(reportPath)
              ? fs.readFileSync(reportPath, 'utf8')
              : 'Monitoring run failed before report generation.'

            const { owner, repo } = context.repo
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            })

            const existing = issues.find((issue) => issue.title === title)
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`
            const body = `Monitoring run failed at ${new Date().toISOString()}\n\nRun: ${runUrl}\n\n${report}`

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              })
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              })
            }

      - name: Resolve open alert issue on green run
        if: success()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[Collector Alert] Parkfolio monitoring failures'
            const { owner, repo } = context.repo
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            })

            const existing = issues.find((issue) => issue.title === title)
            if (!existing) {
              return
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: existing.number,
              body: `Monitoring recovered on ${new Date().toISOString()} (run https://github.com/${owner}/${repo}/actions/runs/${context.runId}).`,
            })

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: existing.number,
              state: 'closed',
            })
